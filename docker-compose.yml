name: shasvata

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shasvata}
      POSTGRES_USER: ${POSTGRES_USER:-shasvata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - shasvata_internal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shasvata_internal_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  platform-api:
    build:
      context: .
      dockerfile: services/platform-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 4000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shasvata_internal_net

  intelligence-api:
    build:
      context: .
      dockerfile: services/intelligence-api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
    ports:
      - "4100:4100"
    networks:
      - shasvata_internal_net

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shasvata_internal_net

  www:
    build:
      context: .
      dockerfile: apps/www/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      PLATFORM_API_BASE_URL: http://platform-api:4000
    ports:
      - "3000:3000"
    networks:
      - shasvata_internal_net

  insights:
    build:
      context: .
      dockerfile: apps/insights/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
    ports:
      - "3001:3001"
    networks:
      - shasvata_internal_net

  intelligence:
    build:
      context: .
      dockerfile: apps/intelligence/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      INTELLIGENCE_API_BASE_URL: http://intelligence-api:4100
    ports:
      - "3002:3002"
    networks:
      - shasvata_internal_net

  app:
    build:
      context: .
      dockerfile: apps/app/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      PLATFORM_API_BASE_URL: http://platform-api:4000
    ports:
      - "3003:3003"
    networks:
      - shasvata_internal_net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      PLATFORM_API_BASE_URL: http://platform-api:4000
      INTELLIGENCE_API_BASE_URL: http://intelligence-api:4100
    ports:
      - "3004:3004"
    networks:
      - shasvata_internal_net

volumes:
  postgres_data:
  redis_data:

networks:
  shasvata_internal_net:
    name: shasvata_internal_net
