name: shasvata-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shasvata_internal_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - shasvata_internal_net

  platform-api:
    image: ${GHCR_IMAGE_NAMESPACE}/platform-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-api.rule: "Host(`api.shasvata.com`)"
      traefik.http.routers.shasvata-api.entrypoints: "websecure"
      traefik.http.routers.shasvata-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-api.priority: "100"
      traefik.http.services.shasvata-api.loadbalancer.server.port: "4000"

  intelligence-api:
    image: ${GHCR_IMAGE_NAMESPACE}/intelligence-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      APP_ENV: production
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-intelligence-api.rule: "Host(`api.shasvata.com`) && PathPrefix(`/intelligence`)"
      traefik.http.routers.shasvata-intelligence-api.entrypoints: "websecure"
      traefik.http.routers.shasvata-intelligence-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-intelligence-api.priority: "200"
      traefik.http.routers.shasvata-intelligence-api.middlewares: "shasvata-intelligence-strip"
      traefik.http.middlewares.shasvata-intelligence-strip.stripprefix.prefixes: "/intelligence"
      traefik.http.services.shasvata-intelligence-api.loadbalancer.server.port: "4100"

  worker:
    image: ${GHCR_IMAGE_NAMESPACE}/worker:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      APP_ENV: production
      REDIS_URL: ${REDIS_URL}
    networks:
      - shasvata_internal_net

  www:
    image: ${GHCR_IMAGE_NAMESPACE}/www:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-www.rule: "Host(`shasvata.com`) || Host(`www.shasvata.com`)"
      traefik.http.routers.shasvata-www.entrypoints: "websecure"
      traefik.http.routers.shasvata-www.tls.certresolver: "letsencrypt"
      traefik.http.services.shasvata-www.loadbalancer.server.port: "3000"

  insights:
    image: ${GHCR_IMAGE_NAMESPACE}/insights:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-insights.rule: "Host(`insights.shasvata.com`)"
      traefik.http.routers.shasvata-insights.entrypoints: "websecure"
      traefik.http.routers.shasvata-insights.tls.certresolver: "letsencrypt"
      traefik.http.services.shasvata-insights.loadbalancer.server.port: "3001"

  intelligence:
    image: ${GHCR_IMAGE_NAMESPACE}/intelligence:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-intelligence.rule: "Host(`intelligence.shasvata.com`)"
      traefik.http.routers.shasvata-intelligence.entrypoints: "websecure"
      traefik.http.routers.shasvata-intelligence.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-intelligence-path.rule: "Host(`shasvata.com`) && PathPrefix(`/intelligence`)"
      traefik.http.routers.shasvata-intelligence-path.entrypoints: "websecure"
      traefik.http.routers.shasvata-intelligence-path.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-intelligence-path.priority: "300"
      traefik.http.routers.shasvata-intelligence-path.middlewares: "shasvata-intelligence-app-strip"
      traefik.http.middlewares.shasvata-intelligence-app-strip.stripprefix.prefixes: "/intelligence"
      traefik.http.services.shasvata-intelligence.loadbalancer.server.port: "3002"

  app:
    image: ${GHCR_IMAGE_NAMESPACE}/app:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-app.rule: "Host(`app.shasvata.com`)"
      traefik.http.routers.shasvata-app.entrypoints: "websecure"
      traefik.http.routers.shasvata-app.tls.certresolver: "letsencrypt"
      traefik.http.services.shasvata-app.loadbalancer.server.port: "3003"

  admin:
    image: ${GHCR_IMAGE_NAMESPACE}/admin:${IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - shasvata_internal_net
      - proxy_net
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy_net"
      traefik.http.routers.shasvata-admin.rule: "Host(`admin.shasvata.com`)"
      traefik.http.routers.shasvata-admin.entrypoints: "websecure"
      traefik.http.routers.shasvata-admin.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-admin-path.rule: "Host(`shasvata.com`) && PathPrefix(`/admin`)"
      traefik.http.routers.shasvata-admin-path.entrypoints: "websecure"
      traefik.http.routers.shasvata-admin-path.tls.certresolver: "letsencrypt"
      traefik.http.routers.shasvata-admin-path.priority: "300"
      traefik.http.routers.shasvata-admin-path.middlewares: "shasvata-admin-strip"
      traefik.http.middlewares.shasvata-admin-strip.stripprefix.prefixes: "/admin"
      traefik.http.services.shasvata-admin.loadbalancer.server.port: "3004"

volumes:
  postgres_data:
  redis_data:

networks:
  shasvata_internal_net:
    name: shasvata_internal_net
  proxy_net:
    external: true
