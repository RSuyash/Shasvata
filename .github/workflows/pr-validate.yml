name: PR Validate
# SOP reference: docs/ops/DEVELOPMENT_WORKFLOW.md

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming convention
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ github.event.pull_request.head.ref }}"
          if [[ ! "$branch" =~ ^(feat|fix|chore|docs|refactor|test)/([0-9]+-)?[a-z0-9._-]+$ ]]; then
            echo "Branch '$branch' does not follow required format." >&2
            echo "Expected: <prefix>/<short-name> or <prefix>/<issue-number>-<short-name>" >&2
            exit 1
          fi

      - name: Validate issue linkage in PR body
        if: ${{ github.event.pull_request.draft == false }}
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          body="$(printf '%s' "${PR_BODY:-}" | tr -d '\r')"
          if ! printf '%s\n' "$body" | grep -Eiq '(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)[[:space:]]*:?[[:space:]]*(#([0-9]+)|https://github\.com/[^[:space:]]+/[^[:space:]]+/issues/[0-9]+)'; then
            echo "PR body must reference an issue." >&2
            echo "Accepted examples: 'Closes #123', 'Fixes #123', 'Refs #123'" >&2
            exit 1
          fi

  detect-changes:
    runs-on: ubuntu-latest
    needs: policy
    if: ${{ github.event.pull_request.draft == false }}
    outputs:
      api_changed: ${{ steps.changes.outputs.api_changed }}
      public_changed: ${{ steps.changes.outputs.public_changed }}
      app_changed: ${{ steps.changes.outputs.app_changed }}
      iccaa_changed: ${{ steps.changes.outputs.iccaa_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path-scoped validation surface
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          api_changed="false"
          public_changed="false"
          app_changed="false"
          iccaa_changed="false"

          while IFS= read -r file; do
            case "$file" in
              services/api/*)
                api_changed="true"
                ;;
              services/web-public/*)
                public_changed="true"
                ;;
              services/web-app/*)
                app_changed="true"
                ;;
              services/iccaa-web/*)
                iccaa_changed="true"
                ;;
            esac
          done < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          echo "api_changed=${api_changed}" >> "$GITHUB_OUTPUT"
          echo "public_changed=${public_changed}" >> "$GITHUB_OUTPUT"
          echo "app_changed=${app_changed}" >> "$GITHUB_OUTPUT"
          echo "iccaa_changed=${iccaa_changed}" >> "$GITHUB_OUTPUT"

  api-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.pull_request.draft == false && needs.detect-changes.outputs.api_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      - name: Install and test API
        shell: bash
        working-directory: services/api
        run: |
          set -euo pipefail
          npm ci --prefer-offline
          npm run typecheck
          npm test

  public-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.pull_request.draft == false && needs.detect-changes.outputs.public_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/web-public/package-lock.json

      - name: Build web-public
        shell: bash
        working-directory: services/web-public
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -euo pipefail
          npm ci --prefer-offline
          npm run build

  app-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.pull_request.draft == false && needs.detect-changes.outputs.app_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/web-app/package-lock.json

      - name: Build web-app
        shell: bash
        working-directory: services/web-app
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -euo pipefail
          npm ci --prefer-offline
          npm run build

  iccaa-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event.pull_request.draft == false && needs.detect-changes.outputs.iccaa_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/iccaa-web/package-lock.json

      - name: Build ICCAA web
        shell: bash
        working-directory: services/iccaa-web
        run: |
          set -euo pipefail
          npm ci --prefer-offline
          npm run build

  build-and-test:
    runs-on: ubuntu-latest
    needs:
      - api-test
      - public-build
      - app-build
      - iccaa-build
    if: ${{ always() && github.event.pull_request.draft == false }}
    steps:
      - name: Fail if any validation lane failed
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.api-test.result }}" \
            "${{ needs.public-build.result }}" \
            "${{ needs.app-build.result }}" \
            "${{ needs.iccaa-build.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "At least one validation lane failed." >&2
              exit 1
            fi
          done

      - name: Summarize validation scope
        shell: bash
        run: |
          set -euo pipefail
          echo "api-test=${{ needs.api-test.result }}"
          echo "public-build=${{ needs.public-build.result }}"
          echo "app-build=${{ needs.app-build.result }}"
          echo "iccaa-build=${{ needs.iccaa-build.result }}"
