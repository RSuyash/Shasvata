name: Deploy Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to roll back to"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/shasvata_key
          chmod 600 ~/.ssh/shasvata_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - name: Roll back Compose image tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOY_TARGET_PATH: ${{ vars.DEPLOY_TARGET_PATH }}
        run: |
          ssh -i ~/.ssh/shasvata_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '${DEPLOY_TARGET_PATH}' && IMAGE_TAG='${IMAGE_TAG}' docker compose -f docker-compose.prod.yml up -d"
