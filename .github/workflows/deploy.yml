name: Deploy to Production
# SOP reference: docs/ops/DEVELOPMENT_WORKFLOW.md

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}
      owner: ${{ steps.meta.outputs.owner }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_head_sha: ${{ steps.pr.outputs.pr_head_sha }}
      deploy_runtime: ${{ steps.changes.outputs.deploy_runtime }}
      deploy_api: ${{ steps.changes.outputs.deploy_api }}
      deploy_public: ${{ steps.changes.outputs.deploy_public }}
      deploy_app: ${{ steps.changes.outputs.deploy_app }}
      deploy_iccaa: ${{ steps.changes.outputs.deploy_iccaa }}
      any_deploy: ${{ steps.changes.outputs.any_deploy }}
      api_image: ${{ steps.meta.outputs.api_image }}
      public_image: ${{ steps.meta.outputs.public_image }}
      app_image: ${{ steps.meta.outputs.app_image }}
      iccaa_image: ${{ steps.meta.outputs.iccaa_image }}
    steps:
      - name: Ensure production deploy targets main
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production deploys must run from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Detect changed deploy surfaces
        id: changes
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const before = context.payload.before;
            const after = context.sha;
            const deploy = { api: false, public: false, app: false, iccaa: false, runtime: false };

            if (!before || /^0+$/.test(before)) {
              core.warning(`Push event before SHA '${before}' is not usable. Enabling all deploy surfaces.`);
              deploy.api = true;
              deploy.public = true;
              deploy.app = true;
              deploy.iccaa = true;
              deploy.runtime = true;
            } else {
              const { data } = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${before}...${after}`,
              });

              const files = data.files || [];
              if (files.length >= 300) {
                core.warning(`Changed file list was truncated (${files.length}). Enabling all deploy surfaces.`);
                deploy.api = true;
                deploy.public = true;
                deploy.app = true;
                deploy.iccaa = true;
                deploy.runtime = true;
              } else {
                for (const file of files) {
                  const path = file.filename || "";
                  if (path.startsWith("services/api/")) deploy.api = true;
                  if (path.startsWith("services/web-public/")) deploy.public = true;
                  if (path.startsWith("services/web-app/")) deploy.app = true;
                  if (path.startsWith("services/iccaa-web/")) deploy.iccaa = true;
                  if (path === "docker-compose.yml" || path === "docker-compose.prod.yml") {
                    deploy.runtime = true;
                    deploy.api = true;
                    deploy.public = true;
                    deploy.app = true;
                    deploy.iccaa = true;
                  }
                  if (path.startsWith("scripts/deploy/") || path.startsWith("scripts/ops/")) {
                    deploy.runtime = true;
                  }
                }
              }
            }

            core.setOutput("deploy_runtime", String(deploy.runtime));
            core.setOutput("deploy_api", String(deploy.api));
            core.setOutput("deploy_public", String(deploy.public));
            core.setOutput("deploy_app", String(deploy.app));
            core.setOutput("deploy_iccaa", String(deploy.iccaa));
            core.setOutput("any_deploy", String(deploy.runtime || deploy.api || deploy.public || deploy.app || deploy.iccaa));

      - name: Resolve merged PR metadata
        id: pr
        if: ${{ steps.changes.outputs.any_deploy == 'true' }}
        uses: actions/github-script@v8
        env:
          ALLOW_DIRECT_MAIN_DEPLOY: ${{ vars.ALLOW_DIRECT_MAIN_DEPLOY }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const allowDirectMainDeploy = String(process.env.ALLOW_DIRECT_MAIN_DEPLOY || "").toLowerCase() === "true";
            const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });

            let mergedPull = pullRequests.find((pr) => Boolean(pr.merged_at));

            if (!mergedPull) {
              const { data: commit } = await github.rest.repos.getCommit({ owner, repo, ref: commitSha });
              const commitMessage = context.payload.head_commit?.message || commit.commit.message || "";
              const match = commitMessage.match(/#(\d+)/);
              if (match) {
                const pullNumber = Number(match[1]);
                try {
                  const { data: pullRequest } = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
                  if (pullRequest.merged_at) {
                    mergedPull = pullRequest;
                  }
                } catch (error) {
                  if (error?.status !== 404) {
                    throw error;
                  }
                  core.info(`Commit message reference #${pullNumber} is not a pull request; continuing.`);
                }
              }
            }

            if (!mergedPull) {
              if (!allowDirectMainDeploy) {
                core.setFailed(
                  `No merged pull request found for ${commitSha}. ` +
                    `Direct-push deploy fallback is disabled by default to keep production deploys safe, predictable, and fast. ` +
                    `Merge via PR or set repository variable ALLOW_DIRECT_MAIN_DEPLOY=true for a one-off override.`
                );
                return;
              }

              core.warning(
                `No merged pull request found for ${commitSha}; continuing in direct-push mode because ALLOW_DIRECT_MAIN_DEPLOY=true.`
              );
              core.setOutput("pr_number", "");
              core.setOutput("pr_head_sha", "");
              return;
            }

            core.setOutput("pr_number", String(mergedPull.number));
            core.setOutput("pr_head_sha", mergedPull.head.sha);

      - name: Resolve release image refs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          sha="${GITHUB_SHA}"
          api_image="ghcr.io/${owner}/shasvata-api:main"
          public_image="ghcr.io/${owner}/shasvata-web-public:main"
          app_image="ghcr.io/${owner}/shasvata-web-app:main"
          iccaa_image="ghcr.io/${owner}/shasvata-iccaa-web:main"

          if [ "${{ steps.changes.outputs.deploy_api }}" = "true" ]; then
            api_image="ghcr.io/${owner}/shasvata-api:${sha}"
          fi
          if [ "${{ steps.changes.outputs.deploy_public }}" = "true" ]; then
            public_image="ghcr.io/${owner}/shasvata-web-public:${sha}"
          fi
          if [ "${{ steps.changes.outputs.deploy_app }}" = "true" ]; then
            app_image="ghcr.io/${owner}/shasvata-web-app:${sha}"
          fi
          if [ "${{ steps.changes.outputs.deploy_iccaa }}" = "true" ]; then
            iccaa_image="ghcr.io/${owner}/shasvata-iccaa-web:${sha}"
          fi

          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$sha" >> "$GITHUB_OUTPUT"
          echo "api_image=$api_image" >> "$GITHUB_OUTPUT"
          echo "public_image=$public_image" >> "$GITHUB_OUTPUT"
          echo "app_image=$app_image" >> "$GITHUB_OUTPUT"
          echo "iccaa_image=$iccaa_image" >> "$GITHUB_OUTPUT"

  await-pr-artifacts:
    needs: prepare
    if: ${{ needs.prepare.outputs.any_deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for PR artifact readiness
        if: ${{ needs.prepare.outputs.pr_head_sha != '' }}
        uses: actions/github-script@v8
        env:
          PR_HEAD_SHA: ${{ needs.prepare.outputs.pr_head_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = process.env.PR_HEAD_SHA;
            const attempts = 36;
            const delayMs = 5000;

            if (!headSha) {
              core.setFailed("PR head SHA is missing.");
              return;
            }

            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                filter: "latest",
                per_page: 100,
              });

              const releaseArtifacts = data.check_runs.find((run) => run.name === "release-artifacts");
              if (!releaseArtifacts) {
                core.info(`Attempt ${attempt}/${attempts}: release-artifacts not visible yet for ${headSha}.`);
              } else if (releaseArtifacts.status !== "completed") {
                core.info(`Attempt ${attempt}/${attempts}: release-artifacts is ${releaseArtifacts.status}.`);
              } else if (releaseArtifacts.conclusion === "success") {
                core.info(`release-artifacts succeeded for ${headSha} on attempt ${attempt}.`);
                return;
              } else {
                core.setFailed(`release-artifacts concluded with ${releaseArtifacts.conclusion} for ${headSha}.`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, delayMs));
            }

            core.setFailed(`Timed out waiting for release-artifacts to succeed for ${headSha}.`);

      - name: Skip PR artifact wait for direct push
        if: ${{ needs.prepare.outputs.pr_head_sha == '' }}
        shell: bash
        run: |
          echo "No merged PR metadata was found, so PR artifact gating is skipped."

  promote-release-images:
    needs: [prepare, await-pr-artifacts]
    if: ${{ needs.prepare.outputs.any_deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository for direct builds
        if: ${{ needs.prepare.outputs.pr_number == '' }}
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        if: ${{ needs.prepare.outputs.pr_number == '' }}
        uses: docker/setup-buildx-action@v3

      - name: Promote release images
        shell: bash
        env:
          OWNER: ${{ needs.prepare.outputs.owner }}
          DEPLOY_SHA: ${{ needs.prepare.outputs.deploy_sha }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          DEPLOY_API: ${{ needs.prepare.outputs.deploy_api }}
          DEPLOY_PUBLIC: ${{ needs.prepare.outputs.deploy_public }}
          DEPLOY_APP: ${{ needs.prepare.outputs.deploy_app }}
          DEPLOY_ICCAA: ${{ needs.prepare.outputs.deploy_iccaa }}
        run: |
          set -euo pipefail

          build_direct_service() {
            local context_path="$1"
            local repo_name="$2"
            local changed="$3"
            local release="ghcr.io/${OWNER}/${repo_name}:${DEPLOY_SHA}"
            local main_tag="ghcr.io/${OWNER}/${repo_name}:main"

            if [ "$changed" != "true" ]; then
              return 0
            fi

            docker buildx build \
              --push \
              --provenance=false \
              -t "$release" \
              -t "$main_tag" \
              "$context_path"
          }

          promote_service() {
            local repo="$1"
            local changed="$2"

            if [ "$changed" = "true" ]; then
              local source="ghcr.io/${OWNER}/${repo}:pr-${PR_NUMBER}"
              docker buildx imagetools inspect "$source" >/dev/null
              docker buildx imagetools create \
                -t "ghcr.io/${OWNER}/${repo}:${DEPLOY_SHA}" \
                -t "ghcr.io/${OWNER}/${repo}:main" \
                "$source"
            fi
          }

          if [ -n "${PR_NUMBER}" ]; then
            promote_service "shasvata-api" "$DEPLOY_API"
            promote_service "shasvata-web-public" "$DEPLOY_PUBLIC"
            promote_service "shasvata-web-app" "$DEPLOY_APP"
            promote_service "shasvata-iccaa-web" "$DEPLOY_ICCAA"
          else
            build_direct_service "services/api" "shasvata-api" "$DEPLOY_API"
            build_direct_service "services/web-public" "shasvata-web-public" "$DEPLOY_PUBLIC"
            build_direct_service "services/web-app" "shasvata-web-app" "$DEPLOY_APP"
            build_direct_service "services/iccaa-web" "shasvata-iccaa-web" "$DEPLOY_ICCAA"
          fi

  deploy:
    needs: [prepare, promote-release-images]
    if: ${{ needs.prepare.outputs.any_deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve SSH ports
        id: ssh_ports
        shell: bash
        run: |
          set -euo pipefail
          primary="${{ secrets.VPS_SSH_PORT }}"
          fallback="${{ secrets.VPS_SSH_FALLBACK_PORT }}"
          if [ -z "$primary" ]; then primary="22"; fi
          if [ -z "$fallback" ] || [ "$fallback" = "$primary" ]; then fallback=""; fi
          echo "primary=$primary" >> "$GITHUB_OUTPUT"
          echo "fallback=$fallback" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        id: deploy_primary
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ needs.prepare.outputs.deploy_sha }}
          DEPLOY_REPO_SLUG: ${{ github.repository }}
          NG_API_IMAGE: ${{ needs.prepare.outputs.api_image }}
          NG_PUBLIC_IMAGE: ${{ needs.prepare.outputs.public_image }}
          NG_APP_IMAGE: ${{ needs.prepare.outputs.app_image }}
          NG_ICCAA_IMAGE: ${{ needs.prepare.outputs.iccaa_image }}
          DEPLOY_API: ${{ needs.prepare.outputs.deploy_api }}
          DEPLOY_PUBLIC: ${{ needs.prepare.outputs.deploy_public }}
          DEPLOY_APP: ${{ needs.prepare.outputs.deploy_app }}
          DEPLOY_ICCAA: ${{ needs.prepare.outputs.deploy_iccaa }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh_ports.outputs.primary }}
          timeout: 90s
          command_timeout: 30m
          envs: DEPLOY_SHA,DEPLOY_REPO_SLUG,NG_API_IMAGE,NG_PUBLIC_IMAGE,NG_APP_IMAGE,NG_ICCAA_IMAGE,DEPLOY_API,DEPLOY_PUBLIC,DEPLOY_APP,DEPLOY_ICCAA,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/apps/shasvata"
            mkdir -p "$(dirname "$REPO_DIR")"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "git@github.com:${DEPLOY_REPO_SLUG}.git" "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git remote set-url origin "git@github.com:${DEPLOY_REPO_SLUG}.git"
            git config core.sshCommand 'ssh -i ~/.ssh/id_github_naya -o IdentitiesOnly=yes -o StrictHostKeyChecking=no'
            dirty_worktree=0
            if ! git diff --quiet; then dirty_worktree=1; fi
            if ! git diff --cached --quiet; then dirty_worktree=1; fi
            if [ -n "$(git ls-files --others --exclude-standard)" ]; then dirty_worktree=1; fi
            if [ "$dirty_worktree" -eq 1 ]; then
              git stash push --include-untracked --message "ci-bootstrap-$(date -u +%Y%m%dT%H%M%SZ)" || true
            fi
            git fetch --prune origin main
            if ! git cat-file -e "${DEPLOY_SHA}^{commit}" 2>/dev/null; then
              git fetch --depth=1 origin "$DEPLOY_SHA"
            fi
            git cat-file -e "${DEPLOY_SHA}^{commit}" 2>/dev/null
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse "$DEPLOY_SHA")" ]; then
              git branch "backup/predeploy-$(date -u +%Y%m%dT%H%M%SZ)-$(git rev-parse --short HEAD)" || true
            fi
            git checkout -B main "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"
            git clean -fdx -e .env -e .env.* -e .env.bak* -e 'docker-compose*.yml.bak*'
            chmod +x scripts/deploy/deploy_main.sh || true
            export DEPLOY_SKIP_GIT_SYNC=true
            export NG_API_IMAGE NG_PUBLIC_IMAGE NG_APP_IMAGE NG_ICCAA_IMAGE
            bash scripts/deploy/deploy_main.sh "$REPO_DIR"

      - name: Deploy via SSH (fallback port)
        id: deploy_fallback
        if: ${{ steps.deploy_primary.outcome == 'failure' && steps.ssh_ports.outputs.fallback != '' }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ needs.prepare.outputs.deploy_sha }}
          DEPLOY_REPO_SLUG: ${{ github.repository }}
          NG_API_IMAGE: ${{ needs.prepare.outputs.api_image }}
          NG_PUBLIC_IMAGE: ${{ needs.prepare.outputs.public_image }}
          NG_APP_IMAGE: ${{ needs.prepare.outputs.app_image }}
          NG_ICCAA_IMAGE: ${{ needs.prepare.outputs.iccaa_image }}
          DEPLOY_API: ${{ needs.prepare.outputs.deploy_api }}
          DEPLOY_PUBLIC: ${{ needs.prepare.outputs.deploy_public }}
          DEPLOY_APP: ${{ needs.prepare.outputs.deploy_app }}
          DEPLOY_ICCAA: ${{ needs.prepare.outputs.deploy_iccaa }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh_ports.outputs.fallback }}
          timeout: 90s
          command_timeout: 30m
          envs: DEPLOY_SHA,DEPLOY_REPO_SLUG,NG_API_IMAGE,NG_PUBLIC_IMAGE,NG_APP_IMAGE,NG_ICCAA_IMAGE,DEPLOY_API,DEPLOY_PUBLIC,DEPLOY_APP,DEPLOY_ICCAA,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/apps/shasvata"
            mkdir -p "$(dirname "$REPO_DIR")"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "git@github.com:${DEPLOY_REPO_SLUG}.git" "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git remote set-url origin "git@github.com:${DEPLOY_REPO_SLUG}.git"
            git config core.sshCommand 'ssh -i ~/.ssh/id_github_naya -o IdentitiesOnly=yes -o StrictHostKeyChecking=no'
            dirty_worktree=0
            if ! git diff --quiet; then dirty_worktree=1; fi
            if ! git diff --cached --quiet; then dirty_worktree=1; fi
            if [ -n "$(git ls-files --others --exclude-standard)" ]; then dirty_worktree=1; fi
            if [ "$dirty_worktree" -eq 1 ]; then
              git stash push --include-untracked --message "ci-bootstrap-$(date -u +%Y%m%dT%H%M%SZ)" || true
            fi
            git fetch --prune origin main
            if ! git cat-file -e "${DEPLOY_SHA}^{commit}" 2>/dev/null; then
              git fetch --depth=1 origin "$DEPLOY_SHA"
            fi
            git cat-file -e "${DEPLOY_SHA}^{commit}" 2>/dev/null
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse "$DEPLOY_SHA")" ]; then
              git branch "backup/predeploy-$(date -u +%Y%m%dT%H%M%SZ)-$(git rev-parse --short HEAD)" || true
            fi
            git checkout -B main "$DEPLOY_SHA"
            git reset --hard "$DEPLOY_SHA"
            git clean -fdx -e .env -e .env.* -e .env.bak* -e 'docker-compose*.yml.bak*'
            chmod +x scripts/deploy/deploy_main.sh || true
            export DEPLOY_SKIP_GIT_SYNC=true
            export NG_API_IMAGE NG_PUBLIC_IMAGE NG_APP_IMAGE NG_ICCAA_IMAGE
            bash scripts/deploy/deploy_main.sh "$REPO_DIR"

      - name: Resolve deploy transport result
        if: ${{ always() }}
        id: deploy_result
        shell: bash
        env:
          PRIMARY_OUTCOME: ${{ steps.deploy_primary.outcome }}
          FALLBACK_OUTCOME: ${{ steps.deploy_fallback.outcome }}
        run: |
          set -euo pipefail
          primary="${PRIMARY_OUTCOME:-}"
          fallback="${FALLBACK_OUTCOME:-}"
          if [ "$primary" = "success" ] || [ "$fallback" = "success" ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "succeeded=false" >> "$GITHUB_OUTPUT"
          echo "Primary SSH outcome: ${primary:-missing}" >&2
          echo "Fallback SSH outcome: ${fallback:-missing}" >&2

      - name: Fail if deploy transport never succeeded
        if: ${{ steps.deploy_result.outputs.succeeded != 'true' }}
        shell: bash
        run: |
          echo "Primary and fallback SSH deploy attempts failed." >&2
          exit 1

      - name: Post-deploy smoke checks
        env:
          DEPLOY_API: ${{ needs.prepare.outputs.deploy_api }}
          DEPLOY_PUBLIC: ${{ needs.prepare.outputs.deploy_public }}
          DEPLOY_APP: ${{ needs.prepare.outputs.deploy_app }}
          DEPLOY_ICCAA: ${{ needs.prepare.outputs.deploy_iccaa }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import time
          import urllib.request

          probes = []
          if os.environ.get("DEPLOY_API") == "true":
              probes.append({"label": "api", "urls": ["https://api.shasvata.com/health"], "expected": {200}, "mode": "all"})
          if os.environ.get("DEPLOY_PUBLIC") == "true":
              probes.append({"label": "public", "urls": ["https://shasvata.com/"], "expected": {200}, "mode": "all"})
          if os.environ.get("DEPLOY_APP") == "true":
              probes.append({"label": "app", "urls": ["https://shasvata.com/app/"], "expected": {200, 307}, "mode": "all"})
          if os.environ.get("DEPLOY_ICCAA") == "true":
              probes.append({"label": "iccaa", "urls": ["https://iccaa.shasvata.com/"], "expected": {200}, "mode": "all"})
          if not probes:
              print("[SMOKE][SKIP] No deploy surfaces selected.")
              raise SystemExit(0)

          last_error = None
          for attempt in range(1, 25):
              overall_ok = True
              for probe in probes:
                  successes = 0
                  for url in probe["urls"]:
                      try:
                          with urllib.request.urlopen(url, timeout=10) as response:
                              if response.status in probe["expected"]:
                                  print(f"[SMOKE][PASS] {probe['label']} {url} -> {response.status}")
                                  successes += 1
                              else:
                                  last_error = f"{probe['label']} {url} returned {response.status}"
                      except Exception as exc:
                          last_error = f"{probe['label']} GET {url} failed: {exc}"
                  if probe["mode"] == "all" and successes != len(probe["urls"]):
                      overall_ok = False
              if overall_ok:
                  raise SystemExit(0)
              print(f"Health check attempt {attempt}/24 failed; retrying in 5s...")
              time.sleep(5)
          raise SystemExit(f"[SMOKE][FAIL] Health check failed: {last_error}")
          PY

      - name: Collect remote diagnostics on failure
        if: ${{ failure() }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.ssh_ports.outputs.primary }}
          timeout: 45s
          command_timeout: 10m
          script: |
            set +e
            cd ~/apps/shasvata
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 || true

  no-deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.any_deploy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: No deploy surfaces changed
        shell: bash
        run: |
          echo "No deployable service changes detected. Skipping deployment."
