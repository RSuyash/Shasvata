name: Deploy

on:
  workflow_run:
    workflows:
      - Docker Build
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/shasvata_key
          chmod 600 ~/.ssh/shasvata_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy on VPS
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          GHCR_IMAGE_NAMESPACE: ghcr.io/rsuyash/shasvata
          DEPLOY_TARGET_PATH: ${{ vars.DEPLOY_TARGET_PATH }}
        run: |
          ssh -i ~/.ssh/shasvata_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd '${DEPLOY_TARGET_PATH}' && GHCR_IMAGE_NAMESPACE='${GHCR_IMAGE_NAMESPACE}' IMAGE_TAG='${IMAGE_TAG}' DEPLOY_TARGET_PATH='${DEPLOY_TARGET_PATH}' sh scripts/deploy/deploy.sh"
